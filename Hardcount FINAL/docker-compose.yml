services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hardcount
      POSTGRES_USER: hardcount
      POSTGRES_PASSWORD: hardcount
    volumes:
      - ./Database/db/hardcount_dump.sql:/docker-entrypoint-initdb.d/hardcount_dump.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hardcount -d hardcount"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: hardcount
      DB_PASSWORD: hardcount
      DB_NAME: hardcount
      SECRET_KEY: hardcount-dev-secret-key-2026
      ADMIN_PASSWORD: ADMIN
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
